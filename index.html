<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOUR_TITLE — הורדות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Rubik:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

<body>

  <!-- =============================================

  <script>

    const DOWNLOADS_FOLDER = "downloads";       // ← תיקיית ההורדות בריפוזיטורי
    const SITE_TITLE = "הורדות";       // ← כותרת האתר
    const SITE_TAGLINE = "כלים שנבנו בקפידה, מוכנים להורדה."; // ← תת-כותרת
  </script>
  <!-- ============================================= -->

  <div class="noise"></div>

  <header>
    <div class="header-inner">
      <div class="wordmark" id="site-title">טוען…</div>

    <section class="hero">
      <p class="hero-label">גרסאות</p>
      <h1 id="hero-title">טוען…</h1>
      <p class="hero-sub" id="hero-sub"></p>
    </section>

    <section class="grid-section">
      <div class="grid" id="grid">
        <!-- הכרטיסיות נוצרות אוטומטית -->
      </div>
      <div class="empty-state hidden" id="empty">
        <span>לא נמצאו הורדות.</span>
        <p>ודא שתיקיית <code>downloads/</code> קיימת בריפוזיטורי עם המבנה הנכון.</p>
      </div>
      <div class="loading-state" id="loading">
        <div class="spinner"></div>
        <span>טוען גרסאות…</span>
      </div>
    </section>
  </main>

  <footer>
    <span id="footer-copy">© <span id="year"></span></span>
    <span class="footer-dot">·</span>
    <a id="footer-gh" href="#" target="_blank">GitHub</a>
  </footer>

  <script src="app.js"></script>

</html>
